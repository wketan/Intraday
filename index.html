<script>
const h=React.createElement,{useState,useEffect,useCallback,useRef}=React;

// ═══ Server URL Config (stored in localStorage for GitHub Pages) ═══
const DEFAULT_SERVER="";
function getServer(){return localStorage.getItem("signal_server_url")||DEFAULT_SERVER}
function setServer(url){localStorage.setItem("signal_server_url",url.replace(/\/$/,""))}
function API(path){const s=getServer();return s?s+path:path}
// CORS: server must allow this origin

// ═══ TA Engine ═══
const TA={
  ema(d,p){const k=2/(p+1),r=[d[0]];for(let i=1;i<d.length;i++)r.push(d[i]*k+r[i-1]*(1-k));return r},
  rsi(c,p=14){const g=[],l=[];for(let i=1;i<c.length;i++){const d=c[i]-c[i-1];g.push(d>0?d:0);l.push(d<0?-d:0)}const ag=this.ema(g,p),al=this.ema(l,p);return ag.map((v,i)=>al[i]===0?100:100-100/(1+v/al[i]))},
  macd(c){const f=this.ema(c,12),s=this.ema(c,26),m=f.map((v,i)=>v-s[i]),g=this.ema(m,9);return{hist:m.map((v,i)=>v-g[i])}},
  atr(h,l,c,p=14){const t=c.map((v,i)=>i===0?h[i]-l[i]:Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));return this.ema(t,p)},
  vwap(h,l,c,v){let a=0,b=0;return c.map((x,i)=>{a+=((h[i]+l[i]+x)/3)*v[i];b+=v[i];return b>0?a/b:x})},
  supertrend(h,l,c,p=10,m=3){const a=this.atr(h,l,c,p),u=[],lb=[],t=[];for(let i=0;i<c.length;i++){const hl=(h[i]+l[i])/2;let ub=hl+m*a[i],lo=hl-m*a[i];if(i>0){ub=ub<u[i-1]||c[i-1]>u[i-1]?ub:u[i-1];lo=lo>lb[i-1]||c[i-1]<lb[i-1]?lo:lb[i-1]}u.push(ub);lb.push(lo);if(i===0){t.push(1);continue}t.push(t[i-1]===-1&&c[i]>u[i-1]?1:t[i-1]===1&&c[i]<lb[i-1]?-1:t[i-1])}return t},
  stoch(h,l,c,k=14){return c.map((_,i)=>{const s=Math.max(0,i-k+1),hh=Math.max(...h.slice(s,i+1)),ll=Math.min(...l.slice(s,i+1));return hh===ll?50:100*(c[i]-ll)/(hh-ll)})},
};

// ═══ Analysis ═══
function getDate(cn){return(cn.t||"").substring(0,10)}
function getMins(cn){const t=cn.t||"";const m=t.match(/(\d{2}):(\d{2}):\d{2}/);return m?parseInt(m[1])*60+parseInt(m[2]):0}
function fmtTime(cn){return(cn.t||"").substring(11,16)||""}
function fmtOpt(sym){
  // "NIFTY02MAR2625550CE" → "NIFTY 25550 CE · 02 Mar"
  if(!sym)return"";
  const m=sym.match(/^([A-Z]+?)(\d{2})([A-Z]{3})(\d{2})(\d+)(CE|PE)$/);
  if(!m)return sym;
  const[,name,dd,mon,yy,strike,ot]=m;
  return name+" "+strike+" "+ot+" · "+dd+" "+mon[0]+mon.slice(1).toLowerCase();
}
function angelUrl(sym,token){
  // Angel One option chain page for the underlying index
  if(!sym)return"#";
  const m=sym.match(/^([A-Z]+?)(\d)/);
  const name=m?m[1].toLowerCase():"nifty";
  return"https://www.angelone.in/option-chain/"+name;
}

function analyze(candles,inst,budget){
  if(candles.length<26)return null;
  const c=candles.map(x=>x.c),hi=candles.map(x=>x.h),lo=candles.map(x=>x.l),v=candles.map(x=>x.v);
  const n=c.length-1,price=c[n];
  const mins=getMins(candles[n]);
  const inWindow=(mins>=560&&mins<=690)||(mins>=840&&mins<=915);
  const today=getDate(candles[n]);
  let todayStart=0,prevDayStart=-1,prevDayEnd=-1;
  for(let i=n;i>=0;i--){const d=getDate(candles[i]);if(d===today)todayStart=i;else if(prevDayEnd===-1)prevDayEnd=i;else if(d!==getDate(candles[prevDayEnd])){prevDayStart=i+1;break}}
  if(todayStart===0)todayStart=Math.max(0,n-74);
  const orbEnd=Math.min(todayStart+3,n);const orbCn=candles.slice(todayStart,orbEnd+1);
  const orbH=orbCn.length>0?Math.max(...orbCn.map(x=>x.h)):hi[n];
  const orbL=orbCn.length>0?Math.min(...orbCn.map(x=>x.l)):lo[n];
  let pdh,pdl;
  if(prevDayStart>=0&&prevDayEnd>=0){pdh=Math.max(...candles.slice(prevDayStart,prevDayEnd+1).map(x=>x.h));pdl=Math.min(...candles.slice(prevDayStart,prevDayEnd+1).map(x=>x.l))}
  else{const half=Math.floor(candles.length/2);pdh=Math.max(...hi.slice(0,half));pdl=Math.min(...lo.slice(0,half))}
  const e9=TA.ema(c,9),e21=TA.ema(c,21),rsi=TA.rsi(c),macd=TA.macd(c);
  const tC=candles.slice(todayStart);const vwapArr=TA.vwap(tC.map(x=>x.h),tC.map(x=>x.l),tC.map(x=>x.c),tC.map(x=>x.v));
  const vwapVal=vwapArr.length>0?vwapArr[vwapArr.length-1]:price;
  const atr=TA.atr(hi,lo,c),st=TA.supertrend(hi,lo,c),stoch=TA.stoch(hi,lo,c);
  const volAvg=v.slice(-20).reduce((a,b)=>a+b)/20,volR=volAvg>0?v[n]/volAvg:1;
  const rv=rsi.length>0?rsi[rsi.length-1]:50;const mh=macd.hist;const sk=stoch.length>0?stoch[stoch.length-1]:50;const av=atr[n]||1;
  const cSO=n-todayStart;const strats=[];let tB=0,tBe=0;const reasons={bull:[],bear:[]};

  // 1. ORB (25) — strongest short-term signal
  if(cSO>=3){
    if(price>orbH&&volR>0.8){tB+=25;strats.push({name:"ORB",dir:"LONG",score:25,detail:"Break above "+orbH.toFixed(0),active:true});reasons.bull.push("ORB Breakout above "+orbH.toFixed(0))}
    else if(price<orbL&&volR>0.8){tBe+=25;strats.push({name:"ORB",dir:"SHORT",score:25,detail:"Break below "+orbL.toFixed(0),active:true});reasons.bear.push("ORB Breakdown below "+orbL.toFixed(0))}
    else strats.push({name:"ORB",dir:"WAIT",score:0,detail:orbL.toFixed(0)+"–"+orbH.toFixed(0),active:false})
  }else strats.push({name:"ORB",dir:"WAIT",score:0,detail:"Forming",active:false});

  // 2. VWAP (20/15/8) — key institutional level
  const vd=((price-vwapVal)/vwapVal)*100;
  if(Math.abs(vd)<0.15&&c[n]>c[n-1]&&price>vwapVal){tB+=20;strats.push({name:"VWAP",dir:"LONG",score:20,detail:"Bounce "+vwapVal.toFixed(0),active:true});reasons.bull.push("VWAP bounce off "+vwapVal.toFixed(0))}
  else if(Math.abs(vd)<0.15&&c[n]<c[n-1]&&price<vwapVal){tBe+=20;strats.push({name:"VWAP",dir:"SHORT",score:20,detail:"Reject "+vwapVal.toFixed(0),active:true});reasons.bear.push("VWAP rejection at "+vwapVal.toFixed(0))}
  else if(price>vwapVal&&c[n]>c[n-1]){tB+=15;strats.push({name:"VWAP",dir:"LONG",score:15,detail:"Above "+vwapVal.toFixed(0)+" ↑",active:true});reasons.bull.push("Above VWAP with momentum")}
  else if(price<vwapVal&&c[n]<c[n-1]){tBe+=15;strats.push({name:"VWAP",dir:"SHORT",score:15,detail:"Below "+vwapVal.toFixed(0)+" ↓",active:true});reasons.bear.push("Below VWAP with momentum")}
  else if(price>vwapVal){tB+=8;strats.push({name:"VWAP",dir:"LONG",score:8,detail:"Above "+vwapVal.toFixed(0),active:false})}
  else{tBe+=8;strats.push({name:"VWAP",dir:"SHORT",score:8,detail:"Below "+vwapVal.toFixed(0),active:false})}

  // 3. EMA+RSI (20/15/8) — trend confirmation
  const emaDiff=((e9[n]-e21[n])/e21[n])*100;
  const crossUp=e9[n]>e21[n]&&e9[Math.max(0,n-2)]<=e21[Math.max(0,n-2)];
  const crossDn=e9[n]<e21[n]&&e9[Math.max(0,n-2)]>=e21[Math.max(0,n-2)];
  if(crossUp&&rv>40&&rv<75){tB+=20;strats.push({name:"EMA+RSI",dir:"LONG",score:20,detail:"Bull cross RSI "+rv.toFixed(0),active:true});reasons.bull.push("EMA 9/21 bullish crossover, RSI "+rv.toFixed(0))}
  else if(crossDn&&rv<60&&rv>25){tBe+=20;strats.push({name:"EMA+RSI",dir:"SHORT",score:20,detail:"Bear cross RSI "+rv.toFixed(0),active:true});reasons.bear.push("EMA 9/21 bearish crossover, RSI "+rv.toFixed(0))}
  else if(e9[n]>e21[n]&&emaDiff>0.03&&rv>45){tB+=15;strats.push({name:"EMA+RSI",dir:"LONG",score:15,detail:"Uptrend RSI "+rv.toFixed(0),active:true});reasons.bull.push("Strong EMA uptrend ("+emaDiff.toFixed(2)+"%)")}
  else if(e9[n]<e21[n]&&emaDiff<-0.03&&rv<55){tBe+=15;strats.push({name:"EMA+RSI",dir:"SHORT",score:15,detail:"Downtrend RSI "+rv.toFixed(0),active:true});reasons.bear.push("Strong EMA downtrend ("+emaDiff.toFixed(2)+"%)")}
  else if(e9[n]>e21[n]){tB+=8;strats.push({name:"EMA+RSI",dir:"LONG",score:8,detail:"9>21",active:false})}
  else{tBe+=8;strats.push({name:"EMA+RSI",dir:"SHORT",score:8,detail:"9<21",active:false})}

  // 4. SuperTrend (20/15/8) — trend direction
  const fUp=st[n]===1&&(st[n-1]===-1||(n>=2&&st[n-2]===-1));
  const fDn=st[n]===-1&&(st[n-1]===1||(n>=2&&st[n-2]===1));
  if(fUp){tB+=20;strats.push({name:"SuperTrend",dir:"LONG",score:20,detail:"Flipped bullish",active:true});reasons.bull.push("SuperTrend flipped bullish")}
  else if(fDn){tBe+=20;strats.push({name:"SuperTrend",dir:"SHORT",score:20,detail:"Flipped bearish",active:true});reasons.bear.push("SuperTrend flipped bearish")}
  else if(st[n]===1&&c[n]>c[n-1]){tB+=15;strats.push({name:"SuperTrend",dir:"LONG",score:15,detail:"Bull + rising",active:true});reasons.bull.push("SuperTrend bullish with momentum")}
  else if(st[n]===-1&&c[n]<c[n-1]){tBe+=15;strats.push({name:"SuperTrend",dir:"SHORT",score:15,detail:"Bear + falling",active:true});reasons.bear.push("SuperTrend bearish with momentum")}
  else if(st[n]===1){tB+=8;strats.push({name:"SuperTrend",dir:"LONG",score:8,detail:"Bullish",active:false})}
  else{tBe+=8;strats.push({name:"SuperTrend",dir:"SHORT",score:8,detail:"Bearish",active:false})}

  // 5. PDH/PDL (15) — key levels
  if(price>pdh&&c[n]>c[n-1]){tB+=15;strats.push({name:"PDH/PDL",dir:"LONG",score:15,detail:"Above PDH "+pdh.toFixed(0),active:true});reasons.bull.push("Previous day high broken ("+pdh.toFixed(0)+")")}
  else if(price<pdl&&c[n]<c[n-1]){tBe+=15;strats.push({name:"PDH/PDL",dir:"SHORT",score:15,detail:"Below PDL "+pdl.toFixed(0),active:true});reasons.bear.push("Previous day low broken ("+pdl.toFixed(0)+")")}
  else strats.push({name:"PDH/PDL",dir:"WAIT",score:0,detail:pdl.toFixed(0)+"–"+pdh.toFixed(0),active:false});

  // Bonus signals
  if(mh[n]>0&&mh[Math.max(0,n-1)]<=0){tB+=5;reasons.bull.push("MACD histogram turned positive")}
  if(mh[n]<0&&mh[Math.max(0,n-1)]>=0){tBe+=5;reasons.bear.push("MACD histogram turned negative")}
  if(volR>1.5){tB+=3;tBe+=3;reasons.bull.push("Volume spike "+volR.toFixed(1)+"x");reasons.bear.push("Volume spike "+volR.toFixed(1)+"x")}

  const conf=Math.min(95,Math.round(Math.max(tB,tBe))),dir=tB>tBe?"LONG":"SHORT";
  const ac=strats.filter(s=>s.active&&s.dir===dir);
  const gap=inst.gap,atm=Math.round(price/gap)*gap;const otm=dir==="LONG"?atm+gap:atm-gap;

  // ── Realistic option premium estimation (REPLAY/DEMO only) ──
  // In LIVE mode, real LTP is fetched from Angel One API — 100% accurate
  // For REPLAY: estimated with ±20% accuracy, clearly labeled "ESTIMATE"
  // IV factors calibrated at ~5 DTE baseline against real market data:
  // BANKNIFTY 61300CE@61189 = ₹276 (5DTE) → ivF=0.0050
  // FINNIFTY 28500CE@28431 = ₹125 (6DTE) → ivF=0.0054
  // NIFTY 25600CE@25571 = ₹90 (6DTE) → ivF=0.0034
  const ivMap={"BANKNIFTY":0.0050,"NIFTY":0.0034,"FINNIFTY":0.0054};
  const ivFactor=ivMap[inst.name]||0.0034;

  // All expiries are now Tuesday (JS getDay: 0=Sun,1=Mon,2=Tue...)
  // NIFTY: weekly Tuesday, BANKNIFTY/FINNIFTY: monthly last Tuesday
  const expiryType={"NIFTY":"weekly","BANKNIFTY":"monthly","FINNIFTY":"monthly"}[inst.name]||"weekly";
  const candleDate=candles[n].t?new Date(candles[n].t.replace(" ","T")):new Date();
  const dayOfWeek=candleDate.getDay(); // 0=Sun..6=Sat
  let dte;
  let expiryDate=null; // actual expiry date for symbol
  if(expiryType==="monthly"){
    const y=candleDate.getFullYear(),m=candleDate.getMonth();
    let d=new Date(y,m+1,0);
    while(d.getDay()!==2)d.setDate(d.getDate()-1);
    dte=Math.round((d-candleDate)/(1000*60*60*24));
    if(dte<0){
      let d2=new Date(y,m+2,0);while(d2.getDay()!==2)d2.setDate(d2.getDate()-1);
      dte=Math.round((d2-candleDate)/(1000*60*60*24));expiryDate=d2;
    }else{expiryDate=d}
  }else{
    dte=2-dayOfWeek;
    if(dte<0)dte+=7;
    expiryDate=new Date(candleDate);expiryDate.setDate(expiryDate.getDate()+dte);
  }
  if(dte<=0)dte=0.3;
  // Format expiry as DDMMMYY for symbol (e.g. "04MAR26")
  const MONTHS=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const expStr=expiryDate?(String(expiryDate.getDate()).padStart(2,"0")+MONTHS[expiryDate.getMonth()]+String(expiryDate.getFullYear()).slice(-2)):"";
  const REF_DTE=5;
  const dteAdj=Math.min(1.2,Math.max(0.20,Math.sqrt(dte/REF_DTE)));

  const atmPrem=Math.round(price*ivFactor*dteAdj);
  const otmDist=Math.abs(otm-price);
  const otmPct=otmDist/price;
  // Near expiry: same OTM distance matters MORE (higher gamma, faster decay)
  const adjOtmPct=otmPct*(REF_DTE/Math.max(dte,0.5));
  const otmMult=adjOtmPct<0.001?0.96:adjOtmPct<0.002?0.90:adjOtmPct<0.004?0.75:adjOtmPct<0.008?0.52:0.32;
  const estPrem=Math.max(5,Math.round(atmPrem*otmMult));

  // ── Delta-based option levels ──
  // Delta also adjusts with DTE: near expiry, OTM delta drops faster
  const delta=adjOtmPct<0.001?0.50:adjOtmPct<0.002?0.42:adjOtmPct<0.004?0.32:adjOtmPct<0.008?0.22:0.12;

  // Index levels
  const entry=dir==="LONG"?+(price+av*0.15).toFixed(2):+(price-av*0.15).toFixed(2);
  const sl=dir==="LONG"?+(price-av*1.2).toFixed(2):+(price+av*1.2).toFixed(2);
  const t1=dir==="LONG"?+(price+av*1.8).toFixed(2):+(price-av*1.8).toFixed(2);
  const t2=dir==="LONG"?+(price+av*2.5).toFixed(2):+(price-av*2.5).toFixed(2);
  const risk=Math.abs(entry-sl),reward=Math.abs(t1-entry);

  // Convert index moves to option premium moves via delta
  const idxMoveToSL=Math.abs(entry-sl);
  const idxMoveToT1=Math.abs(t1-entry);
  const idxMoveToT2=Math.abs(t2-entry);
  const optSL=Math.round(estPrem-idxMoveToSL*delta);
  const optT1=Math.round(estPrem+idxMoveToT1*delta);
  const optT2=Math.round(estPrem+idxMoveToT2*delta);

  // Capital & lots
  const lots=Math.max(1,Math.min(Math.floor(budget*0.5/(estPrem*inst.lot)),2));
  const qty=inst.lot*lots;
  const capital=estPrem*qty;
  const maxLoss=Math.round((estPrem-optSL)*qty);
  const profit1=Math.round((optT1-estPrem)*qty);
  const profit2=Math.round((optT2-estPrem)*qty);

  // Estimated exit timing
  const avgMove=av/4; // avg directional move per 5min candle
  const candlesToT1=avgMove>0?Math.max(2,Math.round(Math.abs(t1-entry)/avgMove)):6;
  const candlesToSL=avgMove>0?Math.max(1,Math.round(Math.abs(sl-entry)/avgMove)):3;
  const t1Mins=candlesToT1*5;const slMins=candlesToSL*5;
  const entryMins=getMins(candles[n]);
  const t1ExitMins=Math.min(entryMins+t1Mins,920); // cap at 15:20
  const slExitMins=Math.min(entryMins+slMins,920);
  const fmtMins=m=>{const h=Math.floor(m/60),mm=m%60;return String(h).padStart(2,"0")+":"+String(mm).padStart(2,"0")};
  const estExit={targetBy:fmtMins(t1ExitMins),slBy:fmtMins(slExitMins),
    duration:t1Mins>=60?Math.floor(t1Mins/60)+"h "+t1Mins%60+"m":t1Mins+"m",candles:candlesToT1};

  return{direction:dir,confidence:conf,price:+price.toFixed(2),entry,sl,target1:t1,target2:t2,
    risk:+risk.toFixed(2),reward:+reward.toFixed(2),rr:risk>0?+(reward/risk).toFixed(1):0,
    strategies:strats,activeCount:ac.length,reasons:dir==="LONG"?reasons.bull:reasons.bear,inWindow,
    indicators:{rsi:+rv.toFixed(1),macd:+((mh[n])||0).toFixed(3),ema9:+e9[n].toFixed(2),ema21:+e21[n].toFixed(2),
      vwap:+vwapVal.toFixed(2),atr:+av.toFixed(2),supertrend:st[n]===1?"BULL":"BEAR",vol:+volR.toFixed(2),
      stoch:+sk.toFixed(0),orbH:+orbH.toFixed(0),orbL:+orbL.toFixed(0),pdh:+pdh.toFixed(0),pdl:+pdl.toFixed(0)},
    option:{action:"BUY "+(dir==="LONG"?"CE":"PE"),symbol:inst.pfx+expStr+otm+(dir==="LONG"?"CE":"PE"),strike:otm,
      lots,lotSize:inst.lot,qty,delta:+delta.toFixed(2),dte:Math.round(dte),
      premium:estPrem,sl:optSL,target1:optT1,target2:optT2,
      capital,maxLoss,profit1,profit2,source:"EST",token:""},
    estExit,time:fmtTime(candles[n]),date:today};
}

const INST=[
  {name:"NIFTY",key:"NIFTY",base:25571,lot:65,gap:50,pfx:"NIFTY"},
  {name:"BANKNIFTY",key:"BANKNIFTY",base:61172,lot:30,gap:100,pfx:"BANKNIFTY"},
  {name:"FINNIFTY",key:"FINNIFTY",base:25800,lot:60,gap:50,pfx:"FINNIFTY"},
];
const G="#22c55e",R="#ef4444",Y="#eab308",B="#3b82f6",P="#a855f7",M="#71717a",D="#a1a1aa",T="#e4e4e7",BG="#18181b",BG2="#1e1e22",BD="rgba(255,255,255,0.06)";

// ═══ Chart ═══
function Chart({candles,sig}){
  if(!candles||candles.length<5)return null;
  const d=candles.slice(-60),c=d.map(x=>x.c);
  const mn=Math.min(...c)*0.9998,mx=Math.max(...c)*1.0002,w=600,ht=150;
  const pts=c.map((v,i)=>(i/(c.length-1))*w+","+(ht-((v-mn)/(mx-mn))*ht)).join(" ");
  const clr=sig&&sig.direction==="LONG"?G:R;
  const lines=[];
  if(sig&&sig.confidence>=40){
    [[sig.entry,Y,"ENTRY"],[sig.sl,R,"SL"],[sig.target1,G,"T1"]].forEach(([val,col,lbl])=>{

  }
  return h("svg",{width:"100%",viewBox:"0 0 "+w+" "+ht,style:{display:"block"}},
    h("defs",null,h("linearGradient",{id:"gf",x1:0,y1:0,x2:0,y2:1},h("stop",{offset:"0%",stopColor:clr,stopOpacity:"0.1"}),h("stop",{offset:"100%",stopColor:clr,stopOpacity:"0"}))),

    }catch{}},300);

                h("div",{className:"mono",style:{width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",
                  background:s.active?clr[s.dir]+"12":"transparent",fontSize:12,fontWeight:700,color:s.score>0?clr[s.dir]:M}},s.score),
                h("div",{style:{flex:1}},
                  h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                    h("span",{style:{fontSize:12,fontWeight:500}},s.name),
                    s.active&&h("div",{style:{width:4,height:4,borderRadius:"50%",background:clr[s.dir]}}),
                    h("span",{style:{fontSize:9,padding:"2px 7px",borderRadius:4,background:clr[s.dir]+"10",color:clr[s.dir],fontWeight:500}},s.dir)),
                  h("div",{style:{fontSize:10,color:M,marginTop:1}},s.detail)))}),
            sig.indicators&&h("div",null,
              h("div",{className:"lbl",style:{marginTop:20,marginBottom:10}},"INDICATORS"),
              h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}},
                [["RSI",sig.indicators.rsi,sig.indicators.rsi>30&&sig.indicators.rsi<70],["MACD",sig.indicators.macd,sig.direction==="LONG"?sig.indicators.macd>0:sig.indicators.macd<0],
                 ["Vol",sig.indicators.vol+"x",sig.indicators.vol>1],["ST",sig.indicators.supertrend,(sig.direction==="LONG"&&sig.indicators.supertrend==="BULL")||(sig.direction==="SHORT"&&sig.indicators.supertrend==="BEAR")],
                 ["Stoch",sig.indicators.stoch,sig.indicators.stoch>20&&sig.indicators.stoch<80],["ATR",sig.indicators.atr,true]].map(([l,v,g])=>
                  h("div",{key:l,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:BG,borderRadius:8,border:"1px solid "+BD}},
                    h("span",{style:{fontSize:10,color:M}},l),
                    h("div",{style:{display:"flex",alignItems:"center",gap:5}},
                      h("span",{className:"mono",style:{fontSize:10,fontWeight:600}},v),
                      h("div",{style:{width:5,height:5,borderRadius:"50%",background:g?G:R}}))))))),
          h("div",{className:"lbl",style:{marginTop:20,marginBottom:10,display:"flex",justifyContent:"space-between"}},
            h("span",null,"RECENT SIGNALS · "+alerts.length),
            alerts.length>0&&h("button",{onClick:()=>setAlerts([]),style:{background:"none",border:"none",color:B,fontSize:10}},"Clear")),
          alerts.length===0?h("div",{className:"card",style:{padding:24,textAlign:"center",color:M,fontSize:11}},"Signals fire when 2+ strategies align at 55%+ in trade window (9:20-11:30 or 2:00-3:15)"):
          h("div",{style:{maxHeight:400,overflowY:"auto"}},alerts.map(a=>{
            const ac=a.direction==="LONG"?G:R;const isLive=a.option&&a.option.source==="LIVE";
            return h("div",{key:a.id,style:{background:BG,borderRadius:10,padding:"12px 14px",marginBottom:6,borderLeft:"3px solid "+ac,border:"1px solid "+BD}},
              // Row 1: Header
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
                h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  h("span",{style:{fontSize:13,fontWeight:700}},a.instrument),
                  h("span",{style:{fontSize:10,fontWeight:700,color:ac}},a.direction),
                  h("span",{style:{fontSize:10,color:Y,fontWeight:600}},a.confidence+"%"),
                  a.option&&h("span",{style:{fontSize:8,padding:"2px 6px",borderRadius:3,background:isLive?G+"20":Y+"20",color:isLive?G:Y,fontWeight:600}},isLive?"LIVE":"EST")),
                h("span",{style:{color:M,fontSize:10}},a.date+" "+a.time)),
              // Row 2: Option trade plan
              a.option&&h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:6}},
                [{l:"BUY",v:(isLive?"₹":"~₹")+a.option.premium,c:Y},
                 {l:"SL",v:(isLive?"₹":"~₹")+a.option.sl,c:R},
                 {l:"T1",v:(isLive?"₹":"~₹")+a.option.target1,c:G},
                 {l:"PROFIT",v:"+₹"+a.option.profit1,c:G}].map(x=>
                  h("div",{key:x.l,style:{background:"#111113",borderRadius:6,padding:"6px 8px"}},
                    h("div",{style:{fontSize:8,color:M,fontWeight:600,textTransform:"uppercase"}},x.l),
                    h("div",{className:"mono",style:{fontSize:11,fontWeight:600,color:x.c}},x.v)))),
              // Row 3: Timing + Symbol
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:10}},
                h("div",{style:{display:"flex",gap:10,color:D}},
                  a.option&&h("span",{style:{color:P}},fmtOpt(a.option.symbol)),
                  h("span",null,"⏰ "+a.time),
                  a.estExit&&h("span",null,"🎯 ~"+a.estExit.targetBy+" ("+a.estExit.duration+")")),
                a.option&&h("span",{style:{color:M}},"₹"+a.option.capital+" capital")),
              // AI verdict (if available in LIVE mode)
              a.ai&&a.ai.verdict&&h("div",{style:{marginTop:6,padding:"6px 10px",background:a.ai.verdict==="TAKE"?G+"10":a.ai.verdict==="SKIP"?R+"10":Y+"10",
                borderRadius:6,fontSize:10,display:"flex",gap:8,alignItems:"center"}},
                h("span",{style:{fontWeight:700,color:a.ai.verdict==="TAKE"?G:a.ai.verdict==="SKIP"?R:Y}},"🤖 "+a.ai.verdict),
                h("span",{style:{color:D}},a.ai.reasoning||""))
            )}))

        ) // right column
      ) // grid
    ), // signals tab

    // ═══ JOURNAL ═══
    tab==="journal"&&h("div",{style:{padding:24,maxWidth:960,margin:"0 auto"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}},
        h("div",null,
          h("div",{style:{fontSize:20,fontWeight:600,marginBottom:4}},"Trade Journal"),
          h("div",{style:{fontSize:12,color:M}},(mode==="replay"?"Backtest":"Live")+" · "+trades.length+" trades · Click to expand details")),
        h("div",{style:{display:"flex",gap:10}},
          [{l:"Win Rate",v:perf.total>0?Math.round(perf.wins/perf.total*100)+"%":"—",c:perf.total>0&&perf.wins/perf.total>=0.5?G:R},
           {l:"Total P&L",v:(perf.pnl>=0?"+":"")+"₹"+perf.pnl.toLocaleString(),c:perf.pnl>=0?G:R}].map(x=>
            h("div",{key:x.l,className:"card",style:{padding:"12px 20px",textAlign:"center"}},
              h("div",{className:"lbl"},x.l),h("div",{className:"mono",style:{fontSize:18,fontWeight:700,color:x.c,marginTop:4}},x.v))))),
      trades.length===0?h("div",{className:"card",style:{padding:48,textAlign:"center",color:M}},"Trades appear during replay"):
      trades.map(t=>h(TradeCard,{key:t.id,t}))),

    // ═══ STATS ═══
    tab==="stats"&&h("div",{style:{padding:28,maxWidth:640,margin:"0 auto"}},
      h("div",{style:{fontSize:20,fontWeight:600,marginBottom:24}},"Performance"+(mode==="replay"?" (Backtest)":"")),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:24}},
        [{l:"Trades",v:perf.total,c:T},{l:"Wins",v:perf.wins,c:G},{l:"Losses",v:perf.losses,c:R},
         {l:"Win %",v:perf.total>0?Math.round(perf.wins/perf.total*100)+"%":"—",c:perf.total>0&&perf.wins/perf.total>=0.5?G:R}].map(x=>
          h("div",{key:x.l,className:"card",style:{padding:20,textAlign:"center"}},
            h("div",{className:"lbl"},x.l),h("div",{className:"mono",style:{fontSize:28,fontWeight:700,color:x.c,marginTop:8}},x.v)))),
      h("div",{className:"card",style:{padding:32,textAlign:"center",marginBottom:20}},
        h("div",{className:"lbl"},"TOTAL P&L"),
        h("div",{className:"mono",style:{fontSize:48,fontWeight:700,color:perf.pnl>=0?G:R,marginTop:8}},(perf.pnl>=0?"+":"")+"₹"+perf.pnl.toLocaleString()),
        h("div",{style:{fontSize:12,color:M,marginTop:8}},"₹20,000 → ₹"+(20000+perf.pnl).toLocaleString())),
      h("div",{className:"card",style:{padding:16}},
        h("div",{className:"lbl",style:{marginBottom:10}},"WIN / LOSS BAR"),
        h("div",{style:{background:BG2,borderRadius:6,height:24,display:"flex",overflow:"hidden"}},
          h("div",{style:{width:(perf.total>0?perf.wins/perf.total*100:50)+"%",background:G,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:10,fontWeight:700,color:"#fff",minWidth:perf.wins>0?36:0,transition:"width 0.8s"}},perf.wins>0?perf.wins+"W":""),
          h("div",{style:{flex:1,background:R,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:10,fontWeight:700,color:"#fff",minWidth:perf.losses>0?36:0}},perf.losses>0?perf.losses+"L":""))),
      h("div",{className:"card",style:{padding:16,marginTop:12}},
        h("div",{className:"lbl",style:{marginBottom:10}},"RULES"),
        [["Min confidence","40%"],["Min strategies","2 of 5"],["Trade windows","9:20-11:30 AM, 2:00-3:15 PM"],
         ["Max per day","3 per instrument"],["SL","30% of premium (70% retained)"],["T1","50% premium gain"],
         ["T2","80% premium gain"],["Max capital/trade","50% of ₹20K"]].map(([l,v])=>
          h("div",{key:l,style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+BD}},
            h("span",{style:{fontSize:11,color:M}},l),h("span",{className:"mono",style:{fontSize:11,fontWeight:500}},v))))),

    // ═══ LOG ═══
    tab==="log"&&h("div",{style:{padding:24,maxWidth:750,margin:"0 auto"}},
      h("div",{style:{fontSize:20,fontWeight:600,marginBottom:20}},"Engine Log"),
      h("div",{className:"mono",style:{fontSize:11,lineHeight:"2"}},
        log.map((l,i)=>h("div",{key:i,style:{color:l.m.includes("ERROR")||l.m.includes("FAILED")||l.m.includes("failed")?R:
          l.m.includes("LONG")||l.m.includes("SHORT")?Y:l.m.includes("OK")||l.m.includes("Ready")?G:M}},
          h("span",{style:{color:M+"80",marginRight:12}},l.t),l.m)))),

    // ═══ CALCULATOR ═══
    tab==="calc"&&h("div",{style:{padding:24,maxWidth:560,margin:"0 auto"}},
      h("div",{style:{fontSize:20,fontWeight:600,marginBottom:6}},"Profit Calculator"),
      h("div",{style:{fontSize:11,color:M,marginBottom:24}},"Calculate P&L for any option trade"),
      (()=>{
        const ci=INST.find(i=>i.name===calcInst)||INST[0];
        const lot=ci.lot;
        const entry=parseFloat(calcEntry)||0;
        const exit=parseFloat(calcExit)||0;
        const useCapital=calcMode==="capital";
        const cap=parseFloat(calcCapital)||20000;
        const manualLots=parseInt(calcLots)||1;
        const autoLots=entry>0?Math.max(1,Math.floor(cap/(entry*lot))):0;
        const lots=useCapital?autoLots:manualLots;
        const qty=lots*lot;
        const invested=entry*qty;
        const exitVal=exit*qty;
        const pnl=exitVal-invested;
        const pnlPct=invested>0?((pnl/invested)*100):0;
        const perLot=(exit-entry)*lot;
        const hasResult=entry>0&&exit>0;

        const inp=(label,val,setVal,ph)=>h("div",null,
          h("div",{className:"lbl",style:{marginBottom:4}},label),
          h("input",{value:val,onChange:e=>setVal(e.target.value),placeholder:ph,
            style:{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid "+BD,
              background:"#111113",color:T,fontSize:14,fontFamily:"SF Mono,monospace",outline:"none",
              boxSizing:"border-box"}}));

        return h("div",null,
          // Index selector
          h("div",{style:{marginBottom:18}},
            h("div",{className:"lbl",style:{marginBottom:6}},"INDEX"),
            h("div",{style:{display:"flex",gap:6}},
              INST.map(i=>h("button",{key:i.name,onClick:()=>setCalcInst(i.name),
                style:{flex:1,padding:"10px 0",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
                  border:calcInst===i.name?"1px solid "+B:"1px solid "+BD,
                  background:calcInst===i.name?B+"15":"transparent",
                  color:calcInst===i.name?B:M}},i.name+" ("+i.lot+")")))),

          // Entry / Exit prices
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}},
            inp("ENTRY PREMIUM (₹)",calcEntry,setCalcEntry,"e.g. 80"),
            inp("EXIT PREMIUM (₹)",calcExit,setCalcExit,"e.g. 120")),

          // Capital vs Lots toggle
          h("div",{style:{marginBottom:18}},
            h("div",{className:"lbl",style:{marginBottom:6}},"QUANTITY BY"),
            h("div",{style:{display:"flex",gap:6,marginBottom:12}},
              ["capital","lots"].map(m=>h("button",{key:m,onClick:()=>setCalcMode(m),
                style:{flex:1,padding:"10px 0",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
                  border:calcMode===m?"1px solid "+B:"1px solid "+BD,
                  background:calcMode===m?B+"15":"transparent",
                  color:calcMode===m?B:M}},m==="capital"?"By Capital":"By Lots"))),
            useCapital?
              inp("CAPITAL (₹)",calcCapital,setCalcCapital,"e.g. 20000"):
              inp("NUMBER OF LOTS",calcLots,setCalcLots,"e.g. 1")),

          // Lot info row
          hasResult&&h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}},
            [{l:"Lot Size",v:lot},{l:"Lots",v:lots},{l:"Qty",v:qty},{l:"Invested",v:"₹"+(invested).toLocaleString("en-IN",{maximumFractionDigits:0})}].map(x=>
              h("div",{key:x.l,style:{background:"#111113",borderRadius:10,padding:"12px 14px"}},
                h("div",{className:"lbl"},x.l),
                h("div",{className:"mono",style:{fontSize:13,fontWeight:600,color:D}},x.v)))),

          // P&L Result
          hasResult&&h("div",{style:{background:pnl>=0?G+"10":R+"10",border:"1px solid "+(pnl>=0?G+"25":R+"25"),
            borderRadius:14,padding:24,textAlign:"center",marginBottom:16}},
            h("div",{style:{fontSize:11,color:M,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}},"Net Profit / Loss"),
            h("div",{className:"mono",style:{fontSize:36,fontWeight:700,color:pnl>=0?G:R,letterSpacing:"-0.02em"}},
              (pnl>=0?"+":"")+"₹"+Math.abs(pnl).toLocaleString("en-IN",{maximumFractionDigits:0})),
            h("div",{style:{fontSize:13,color:pnl>=0?G:R,marginTop:4}},
              (pnlPct>=0?"+":"")+pnlPct.toFixed(1)+"% return")),

          // Per-lot breakdown
          hasResult&&h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}},
            [{l:"Per Lot P&L",v:(perLot>=0?"+":"")+"₹"+Math.abs(perLot).toLocaleString("en-IN",{maximumFractionDigits:0}),c:perLot>=0?G:R},
             {l:"Move (₹)",v:(exit-entry>=0?"+":"")+(exit-entry).toFixed(1),c:exit-entry>=0?G:R},
             {l:"Move (%)",v:(entry>0?((exit-entry)/entry*100).toFixed(1):"0")+"%",c:exit>=entry?G:R}].map(x=>
              h("div",{key:x.l,style:{background:"#111113",borderRadius:10,padding:"12px 14px"}},
                h("div",{className:"lbl"},x.l),
                h("div",{className:"mono",style:{fontSize:14,fontWeight:600,color:x.c}},x.v)))),

          // Quick scenario buttons
          hasResult&&entry>0&&h("div",{style:{marginTop:16}},
            h("div",{className:"lbl",style:{marginBottom:6}},"QUICK SCENARIOS"),
            h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
              [{l:"-30% SL",m:0.70},{l:"-20%",m:0.80},{l:"-10%",m:0.90},{l:"+25%",m:1.25},{l:"+50% T1",m:1.50},{l:"+80% T2",m:1.80},{l:"+100%",m:2.0}].map(s=>
                h("button",{key:s.l,onClick:()=>setCalcExit((entry*s.m).toFixed(1)),
                  style:{padding:"6px 12px",borderRadius:6,fontSize:10,fontWeight:600,cursor:"pointer",
                    border:"1px solid "+(s.m>=1?G+"30":R+"30"),background:s.m>=1?G+"08":R+"08",
                    color:s.m>=1?G:R}},s.l))))
        )
      })()),

    h("footer",{style:{borderTop:"1px solid "+BD,padding:"10px 24px",fontSize:10,color:M+"60",textAlign:"center"}},
      "40% min · 2+ strategies · Trade windows only · Max 3/day · Live option chain")
  );
}
ReactDOM.render(h(App),document.getElementById("root"));
</script>
</body>
</html>
